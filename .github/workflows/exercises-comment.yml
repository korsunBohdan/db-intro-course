name: Exercise Test Results

on:
  workflow_run:
    workflows: ["Exercise Tests"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Download PR number
        id: download-pr
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pr-number
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read PR number
        id: pr
        run: |
          if [ -f pr_number.txt ]; then
            echo "number=$(cat pr_number.txt)" >> $GITHUB_OUTPUT
          fi

      - name: Download all test results
        if: steps.pr.outputs.number != ''
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: test-results-*
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Build comment body
        if: steps.pr.outputs.number != ''
        id: build-comment
        run: |
          comment="## Результати тестів\n\n"
          comment+="| Набір даних | Успіх | Фейл | Скіп | Статус |\n"
          comment+="|-------------|-------|------|------|--------|\n"

          overall_status="success"

          total_passed=0
          total_failed=0
          total_skipped=0

          for snapshot in base 10k 100k; do
            report="results/test-results-${snapshot}/report_${snapshot}.json"
            if [ -f "$report" ]; then
              passed=$(jq '.summary.passed // 0' "$report")
              failed=$(jq '.summary.failed // 0' "$report")
              skipped=$(jq '.summary.skipped // 0' "$report")

              total_passed=$((total_passed + passed))
              total_failed=$((total_failed + failed))
              total_skipped=$((total_skipped + skipped))

              if [ "$failed" -gt 0 ]; then
                status="❌"
              elif [ "$passed" -gt 0 ]; then
                status="✅"
              else
                status="⚠️"
              fi

              comment+="| ${snapshot} | ${passed} | ${failed} | ${skipped} | ${status} |\n"
            else
              comment+="| ${snapshot} | - | - | - | ⚠️ Немає результатів |\n"
              overall_status="failure"
            fi
          done

          failures=""
          for snapshot in base 10k 100k; do
            report="results/test-results-${snapshot}/report_${snapshot}.json"
            if [ -f "$report" ]; then
              failed_count=$(jq '[.tests[] | select(.outcome == "failed")] | length' "$report")
              for i in $(seq 0 $((failed_count - 1))); do
                name=$(jq -r "[.tests[] | select(.outcome == \"failed\")][$i].nodeid | split(\"::\") | last" "$report")
                stdout=$(jq -r "[.tests[] | select(.outcome == \"failed\")][$i].call.stdout // \"\"" "$report")

                {
                  display_name="${name#test_}.sql"
                  echo "#### ❌ ${display_name} (${snapshot})"
                  if [ -n "$stdout" ]; then
                    echo ""
                    echo '```'
                    echo "$stdout"
                    echo '```'
                    echo ""
                  fi
                } >> /tmp/failures_${snapshot}.txt
              done

              if [ -f /tmp/failures_${snapshot}.txt ] && [ -s /tmp/failures_${snapshot}.txt ]; then
                failures+="$(cat /tmp/failures_${snapshot}.txt)\n"
              fi
            fi
          done

          if [ -n "$failures" ]; then
            comment+="\n---\n"
            comment+="\n### Помилки\n\n"
            comment+="${failures}"
          fi

          comment+="\n---\n"
          comment+="\n<details>\n<summary><b>Деталі</b></summary>\n\n"

          for snapshot in base 10k 100k; do
            report="results/test-results-${snapshot}/report_${snapshot}.json"
            if [ -f "$report" ]; then

              jq -r '.tests[] | "\(.nodeid | split("::") | last)\t\(.outcome)\t\(.call.duration // 0)"' "$report" | while IFS=$'\t' read -r name outcome duration; do
                duration_fmt=$(printf "%.2f" "$duration")
                case "$outcome" in
                  passed)  icon="✅" ;;
                  failed)  icon="❌" ;;
                  skipped) icon="⚠️" ;;
                  *)       icon="❓" ;;
                esac

                display_name="${name#test_}.sql"
                echo "#### ${display_name}"
                echo "${icon} ${outcome} in ${duration_fmt}s"
              done >> /tmp/details_table_${snapshot}.txt

              comment+="$(cat /tmp/details_table_${snapshot}.txt)\n"
            fi
          done

          comment+="\n</details>\n"
          comment+="\n---\n"

          if [ "$total_failed" -gt 0 ]; then
            comment+="⚠️ **Деякі тести неуспішні.**"
          elif [ "$total_passed" -gt 0 ] && [ "$total_skipped" -eq 0 ]; then
            comment+="🎉 **Усі тести успішні!**"
          elif [ "$total_passed" -gt 0 ]; then
            comment+="✅ **Виконані вправи правильні.** Деякі вправи пропущено (не реалізовані)."
          fi

          {
            echo "body<<EOF"
            echo -e "$comment"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post comment to PR
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: exercise-test-results
          number: ${{ steps.pr.outputs.number }}
          message: ${{ steps.build-comment.outputs.body }}