name: Exercise Tests

on:
  pull_request:
    paths:
      - 'exercises/**'

permissions:
  contents: read

env:
  FIXTURE_RELEASE: exercises-fixture-v2

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        snapshot: [base, 10k, 100k]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: exercises/tests
        run: pip install -r requirements.txt

      - name: Get dump (${{ matrix.snapshot }})
        working-directory: dumps
        run: |
          if [ "${{ matrix.snapshot }}" == "base" ]; then
            exit 0
          else
            curl -L --fail -o ${{ matrix.snapshot }}.dump https://github.com/ZheniaTrochun/db-intro-course/releases/download/${{ env.FIXTURE_RELEASE }}/${{ matrix.snapshot }}.dump
          fi

      - name: Get golden snapshots (${{ matrix.snapshot }})
        working-directory: exercises/tests/golden_snapshots
        run: |
          if [ "${{ matrix.snapshot }}" == "base" ]; then
            exit 0
          else
            curl -L --fail -o ${{ matrix.snapshot }}.zip https://github.com/ZheniaTrochun/db-intro-course/releases/download/${{ env.FIXTURE_RELEASE }}/${{ matrix.snapshot }}.zip
            unzip ${{ matrix.snapshot }}.zip
          fi
          test -d ${{ matrix.snapshot }}

      - name: Run tests (${{ matrix.snapshot }})
        working-directory: exercises/tests
        run: |
          pytest \
            --snapshot ${{ matrix.snapshot }} \
            --json-report \
            --json-report-file=test_results/report_${{ matrix.snapshot }}.json \
            --no-header \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.snapshot }}
          path: exercises/tests/test_results/

  save-pr-number:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Save PR number
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: echo "$PR_NUMBER" > pr_number.txt

      - name: Upload PR number
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr_number.txt
